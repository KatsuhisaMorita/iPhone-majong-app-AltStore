<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MajongScoreMemo - UI Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <div id="simulator-frame">
    <div id="status-bar">
      <span class="time" id="status-time">12:00</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M1 6h2v6H1V6zm4-3h2v9H5V3zm4-3h2v12H9V0zm4 4h2v8h-2V4z"/></svg>
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><path d="M1 8.5a7.5 7.5 0 0112.6-5.5l-1.4 1.4A5.5 5.5 0 003 8.5h-2zm4 0a3.5 3.5 0 015.9-2.5L9.5 7.4A1.5 1.5 0 007 8.5H5z"/></svg>
        <svg width="22" height="12" viewBox="0 0 22 12" fill="currentColor"><rect x="0" y="1" width="18" height="10" rx="2" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="2" y="3" width="12" height="6" rx="1" fill="currentColor"/><path d="M19 4.5v3a1.5 1.5 0 000-3z"/></svg>
      </div>
    </div>
    <div id="app"></div>
    <div id="home-indicator"></div>
  </div>
  <div id="simulator-label">
    <span>📱 iOS UI Simulator</span>
    <span class="mode-badge">DEV MODE</span>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
